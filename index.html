<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLAMES Ultra</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">
  <h1>🔥 FLAMES</h1>
  <p class="tagline">Find your relationship destiny</p>

  <form id="flames-form">
    <div class="field">
      <label>First Name</label>
      <input type="text" id="nameOne" required>
      <div class="counter" id="countOne">0 characters</div>
    </div>

    <div class="field">
      <label>Second Name</label>
      <input type="text" id="nameTwo" required>
      <div class="counter" id="countTwo">0 characters</div>
    </div>

    <div class="buttons">
      <button type="submit" class="primary">Reveal</button>
      <button type="button" class="ghost" id="resetBtn">Reset</button>
    </div>
  </form>
  <details class="rules">
          <summary>How it works</summary>
          <ol>
            <li>Remove all matching letters from both names.</li>
            <li>Count the remaining letters.</li>
            <li>Cycle through FLAMES until you land on the result.</li>
          </ol>
        </details>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Calculating compatibility...
  </div>

  <div class="flames-letters" id="letters"></div>
  <div class="result-card" id="resultCard"></div>
</div>

<script src="script.js"></script>
</body>
</html>
